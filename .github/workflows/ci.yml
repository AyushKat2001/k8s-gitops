name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-helm:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Validate Helm Charts
        run: |
          helm lint apps/nodejs-app/
      - name: Template Helm chart
        run: |
          helm template nodejs-app apps/nodejs-app/ \
            --values apps/nodejs-app/values.yaml

  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: validate-helm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin

      - name: Render and Validate Kubernetes Manifests
        run: |
          helm template nodejs-app apps/nodejs-app/ \
          --values apps/nodejs-app/values.yaml | \
          kubeconform -strict -ignore-missing-schemas

  validate-argocd:
      name: Validate ArgoCD Application
      runs-on: ubuntu-latest
      needs: validate-helm  
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install kubeconform
          run: |
            wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
            tar xf kubeconform-linux-amd64.tar.gz
            sudo mv kubeconform /usr/local/bin

        - name: Validate ArgoCD Application
          run: |
            kubeconform -strict -ignore-missing-schemas infrastructure/argocd/application.yaml