apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-service
    labels:
        app: {{ .Chart.Name }}
spec:
  type: {{ .values.service.type }}
  selector:
    app: {{ .Chart.Name }}
  ports:
    - protocol: TCP
      port: {{ .values.service.port }}
      targetPort: {{ .values.service.targetPort }}
